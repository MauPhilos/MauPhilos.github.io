name: Sync Agent Skills Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */8 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch and build local content
        run: |
          mkdir -p _data/agentskills
          mkdir -p agent-skills/scenario

          python <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from urllib.parse import urljoin, urlparse

          import requests
          from bs4 import BeautifulSoup

          BASE = "https://agentskillshub.top"
          session = requests.Session()
          session.headers.update({
              "User-Agent": "MauPhilos-AgentSkills-Sync/2.0 (+https://ybot.top)"
          })

          def fetch_html(url: str) -> str:
              r = session.get(url, timeout=30)
              r.raise_for_status()
              return r.text

          def soup_of(url: str) -> BeautifulSoup:
              return BeautifulSoup(fetch_html(url), "html.parser")

          def page_text(url: str) -> str:
              return soup_of(url).get_text("\n", strip=True)

          def safe_slug(text: str) -> str:
              slug = text.strip().lower()
              slug = re.sub(r"[^a-z0-9\-]+", "-", slug)
              slug = re.sub(r"-+", "-", slug).strip("-")
              return slug or "item"

          def escape_yaml(s: str) -> str:
              return s.replace('"', "'").strip()

          def parse_home_summary():
              text = page_text(BASE + "/")

              tools_count = None
              projects_count = None
              scenarios_count = None
              refresh_hours = None

              m = re.search(r"Discover\s+([\d,]+)\+\s+AI Agent Tools", text, re.I)
              if m:
                  tools_count = m.group(1) + "+"

              m = re.search(r"Tracking\s+([\d,]+)\+\s+projects\s+across\s+(\d+)\s+scenarios", text, re.I)
              if m:
                  projects_count = m.group(1) + "+"
                  scenarios_count = m.group(2)

              m = re.search(r"auto-updated every\s+(\d+)\s+hours", text, re.I)
              if m:
                  refresh_hours = m.group(1)

              return {
                  "tools_count": tools_count,
                  "projects_count": projects_count,
                  "scenarios_count": scenarios_count,
                  "refresh_hours": refresh_hours,
                  "source": BASE,
              }

          def parse_best_scenarios():
              soup = soup_of(BASE + "/best/")
              items = []
              seen = set()

              for a in soup.select('a[href^="/best/"]'):
                  href = a.get("href", "").strip()
                  name = a.get_text(" ", strip=True).replace("→", "").strip()
                  full = urljoin(BASE, href)
                  path = urlparse(full).path.rstrip("/")

                  if not href or not name or path in ("/best", "") or full in seen:
                      continue

                  slug = safe_slug(path.split("/")[-1])
                  seen.add(full)
                  items.append({
                      "name": name,
                      "source_url": full,
                      "slug": slug,
                      "local_url": f"/agent-skills/scenario/{slug}/"
                  })

              dedup = []
              seen_slug = set()
              for item in items:
                  if item["slug"] in seen_slug:
                      continue
                  seen_slug.add(item["slug"])
                  dedup.append(item)
              return dedup

          def parse_scenario_page(path: str):
              url = BASE + path
              text = page_text(url)
              slug = safe_slug(path.strip("/").split("/")[-1])

              title = None
              m = re.search(r"#\s*(Best AI Agent Skills for .+? in 2026)", text)
              if m:
                  title = m.group(1).strip()
              if not title:
                  m = re.search(r"(Best AI Agent Skills for .+? in 2026)", text)
                  title = m.group(1).strip() if m else slug.replace("-", " ").title()

              quick_pick = {}
              qp = re.search(
                  r"Quick Pick\s*—\s*If you only pick one, go with\s+(.+?)\s+★\s*([^\s]+)\s*—\s*(.+?)\n",
                  text,
                  re.S,
              )
              if qp:
                  quick_pick = {
                      "name": qp.group(1).strip(),
                      "stars": qp.group(2).strip(),
                      "tagline": re.sub(r"\s+", " ", qp.group(3)).strip(),
                  }

              section = ""
              sm = re.search(
                  r"##\s*Top\s+\d+\s+.+?Tools(.*?)(?:##\s*Comparison|##\s*Frequently Asked Questions|###\s*Get Weekly)",
                  text,
                  re.S,
              )
              if sm:
                  section = sm.group(1)

              tools = []
              pattern = re.compile(
                  r"(?ms)^\s*(\d+)\s+(.+?)\s+by\s+(.+?)\n+\s*★\s*([^\s]+)\s+([^\n]+?)\n+\s*(.*?)\n+\s*View Details"
              )
              for rank, name, author, stars, meta, desc in pattern.findall(section):
                  tools.append({
                      "rank": int(rank),
                      "name": re.sub(r"\s+", " ", name).strip(),
                      "author": re.sub(r"\s+", " ", author).strip(),
                      "stars": stars.strip(),
                      "meta": re.sub(r"\s+", " ", meta).strip(),
                      "description": re.sub(r"\s+", " ", desc).strip(),
                  })

              return {
                  "title": title,
                  "source_url": url,
                  "slug": slug,
                  "local_url": f"/agent-skills/scenario/{slug}/",
                  "quick_pick": quick_pick,
                  "tools": tools[:10],
              }

          def write_json(path: str, data):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          def write_local_scenario_page(block):
              slug = block["slug"]
              title = block["title"]
              source_url = block["source_url"]
              quick_pick = block.get("quick_pick", {})
              tools = block.get("tools", [])

              lines = [
                  "---",
                  "layout: page",
                  f'title: "{escape_yaml(title)}"',
                  f"permalink: /agent-skills/scenario/{slug}/",
                  "---",
                  "",
                  f"# {title}",
                  "",
                  f"原始来源：[点击查看原站]({source_url})",
                  "",
              ]

              if quick_pick.get("name"):
                  qp_line = f'**{quick_pick["name"]}**'
                  if quick_pick.get("stars"):
                      qp_line += f' · ★ {quick_pick["stars"]}'
                  if quick_pick.get("tagline"):
                      qp_line += f' · {quick_pick["tagline"]}'
                  lines.extend(["## Quick Pick", qp_line, ""])

              lines.extend(["## 工具列表", ""])
              if tools:
                  for tool in tools:
                      line = f'- **{tool["name"]}**'
                      if tool.get("author"):
                          line += f' by {tool["author"]}'
                      if tool.get("stars"):
                          line += f' · ★ {tool["stars"]}'
                      if tool.get("meta"):
                          line += f' · {tool["meta"]}'
                      lines.append(line)
                      if tool.get("description"):
                          lines.append(f'  - {tool["description"]}')
              else:
                  lines.append("暂无工具数据。")
              lines.append("")

              out_path = os.path.join("agent-skills", "scenario", f"{slug}.md")
              with open(out_path, "w", encoding="utf-8") as f:
                  f.write("\n".join(lines))

          def cleanup_old_generated_pages(valid_slugs):
              out_dir = os.path.join("agent-skills", "scenario")
              os.makedirs(out_dir, exist_ok=True)
              for filename in os.listdir(out_dir):
                  if filename.endswith(".md") and filename[:-3] not in valid_slugs:
                      os.remove(os.path.join(out_dir, filename))

          summary = parse_home_summary()
          all_scenarios = parse_best_scenarios()

          # 先生成前 12 个热门场景，避免首页只有 3 个
          selected = all_scenarios[:12]
          curated = []
          valid_slugs = set()

          for item in selected:
              path = urlparse(item["source_url"]).path
              try:
                  block = parse_scenario_page(path)
              except Exception as e:
                  block = {
                      "title": item["name"],
                      "source_url": item["source_url"],
                      "slug": item["slug"],
                      "local_url": item["local_url"],
                      "quick_pick": {},
                      "tools": [],
                      "error": str(e),
                  }
              curated.append(block)
              valid_slugs.add(block["slug"])

          meta = {
              "source": BASE,
              "updated_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC"),
          }

          write_json("_data/agentskills/meta.json", meta)
          write_json("_data/agentskills/summary.json", summary)
          write_json("_data/agentskills/curated.json", curated)

          cleanup_old_generated_pages(valid_slugs)
          for block in curated:
              write_local_scenario_page(block)

          print(f"Done. Generated {len(curated)} local scenario pages.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/agentskills agent-skills/scenario
          git diff --cached --quiet || git commit -m "chore: sync AgentSkillsHub content"

      - name: Push changes
        run: git push
