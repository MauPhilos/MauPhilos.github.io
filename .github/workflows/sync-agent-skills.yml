name: Sync Agent Skills Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */8 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch and build local content
        run: |
          mkdir -p _data/agentskills
          mkdir -p agent-skills/scenario

          python <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from urllib.parse import urljoin, urlparse

          import requests
          from bs4 import BeautifulSoup

          BASE = "https://agentskillshub.top"

          session = requests.Session()
          session.headers.update({
              "User-Agent": "MauPhilos-AgentSkills-Sync/1.0 (+https://ybot.top)"
          })

          def fetch_html(url: str) -> str:
              r = session.get(url, timeout=30)
              r.raise_for_status()
              return r.text

          def soup_of(url: str) -> BeautifulSoup:
              return BeautifulSoup(fetch_html(url), "html.parser")

          def text_lines(soup: BeautifulSoup):
              return [x.strip() for x in soup.get_text("\n").splitlines() if x.strip()]

          def safe_slug(text: str) -> str:
              slug = text.strip().lower()
              slug = re.sub(r"[^a-z0-9\-]+", "-", slug)
              slug = re.sub(r"-+", "-", slug).strip("-")
              return slug or "item"

          def escape_yaml(s: str) -> str:
              return s.replace('"', "'").strip()

          def parse_home_summary():
              soup = soup_of(BASE + "/")
              text = "\n".join(text_lines(soup))

              tools_count = None
              projects_count = None
              scenarios_count = None
              refresh_hours = None

              m = re.search(r"Discover\s+([\d,]+)\+\s+AI Agent Tools", text, re.I)
              if m:
                  tools_count = m.group(1) + "+"

              m = re.search(r"Tracking\s+([\d,]+)\+\s+projects\s+across\s+(\d+)\s+scenarios", text, re.I)
              if m:
                  projects_count = m.group(1) + "+"
                  scenarios_count = m.group(2)

              m = re.search(r"auto-updated every\s+(\d+)\s+hours", text, re.I)
              if m:
                  refresh_hours = m.group(1)

              return {
                  "tools_count": tools_count,
                  "projects_count": projects_count,
                  "scenarios_count": scenarios_count,
                  "refresh_hours": refresh_hours,
                  "source": BASE
              }

          def parse_best_scenarios():
              soup = soup_of(BASE + "/best/")
              items = []
              seen = set()

              for a in soup.select("a[href]"):
                  href = a.get("href", "").strip()
                  name = a.get_text(" ", strip=True).replace("→", "").strip()
                  if not href or not name:
                      continue

                  full = urljoin(BASE, href)
                  path = urlparse(full).path.rstrip("/")

                  if not path.startswith("/best"):
                      continue
                  if path in ("/best", ""):
                      continue
                  if full in seen:
                      continue
                  if name in {"GitHub", "Home", "中文", "X"}:
                      continue
                  if len(name) < 2:
                      continue

                  slug = safe_slug(path.strip("/").split("/")[-1])

                  seen.add(full)
                  items.append({
                      "name": name,
                      "url": full,
                      "source_url": full,
                      "slug": slug,
                      "local_url": f"/agent-skills/scenario/{slug}/"
                  })

              return items

          def parse_scenario_page(path: str):
              url = BASE + path
              soup = soup_of(url)
              lines = text_lines(soup)
              text = "\n".join(lines)

              slug = safe_slug(path.strip("/").split("/")[-1])

              title = None
              h1 = soup.find("h1")
              if h1:
                  title = h1.get_text(" ", strip=True)

              if not title:
                  title_tag = soup.find("title")
                  if title_tag:
                      title = title_tag.get_text(" ", strip=True)

              if not title:
                  title = slug.replace("-", " ").title()

              quick_pick = {}
              qp = re.search(
                  r"Quick Pick\s*—\s*If you only pick one, go with\s+(.+?)\s+★\s*([^\s]+)\s*—\s*(.+)",
                  text,
                  re.I
              )
              if qp:
                  quick_pick = {
                      "name": qp.group(1).strip(),
                      "stars": qp.group(2).strip(),
                      "tagline": qp.group(3).strip()
                  }

              tools = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  m = re.match(r"^(\d+)\s+(.+?)\s+by\s+(.+)$", line)
                  if m:
                      rank, name, author = m.groups()
                      stars = ""
                      meta = ""
                      description = ""

                      j = i + 1
                      while j < len(lines) and j < i + 10:
                          nxt = lines[j]

                          if re.match(r"^\d+\s+.+?\s+by\s+.+$", nxt):
                              break
                          if nxt.lower().startswith("comparison") or nxt.startswith("## Comparison"):
                              break

                          if nxt.startswith("★"):
                              sm = re.match(r"^★\s*([^\s]+)\s*(.*)$", nxt)
                              if sm:
                                  stars = sm.group(1).strip()
                                  meta = sm.group(2).strip()
                          elif nxt not in {
                              "View Details → GitHub →",
                              "View Details →",
                              "GitHub →"
                          } and not nxt.startswith("##"):
                              if not description and len(nxt) > 2:
                                  description = nxt

                          j += 1

                      tools.append({
                          "rank": int(rank),
                          "name": name.strip(),
                          "author": author.strip(),
                          "stars": stars,
                          "meta": meta,
                          "description": description
                      })
                      i = j
                      continue
                  i += 1

              return {
                  "title": title,
                  "url": url,
                  "source_url": url,
                  "slug": slug,
                  "local_url": f"/agent-skills/scenario/{slug}/",
                  "quick_pick": quick_pick,
                  "tools": tools[:10]
              }

          def write_json(path: str, data):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          def write_local_scenario_page(block):
              slug = block.get("slug")
              if not slug:
                  return

              title = block.get("title", slug.replace("-", " ").title())
              source_url = block.get("source_url", "")
              quick_pick = block.get("quick_pick", {})
              tools = block.get("tools", [])

              lines = []
              lines.append("---")
              lines.append("layout: page")
              lines.append(f'title: "{escape_yaml(title)}"')
              lines.append(f"permalink: /agent-skills/scenario/{slug}/")
              lines.append("---")
              lines.append("")
              lines.append(f"# {title}")
              lines.append("")
              if source_url:
                  lines.append(f'原始来源：[点击查看原站]({source_url})')
                  lines.append("")

              if quick_pick and quick_pick.get("name"):
                  lines.append("## Quick Pick")
                  qp_line = f'**{quick_pick.get("name", "")}**'
                  if quick_pick.get("stars"):
                      qp_line += f' · ★ {quick_pick.get("stars")}'
                  if quick_pick.get("tagline"):
                      qp_line += f' · {quick_pick.get("tagline")}'
                  lines.append(qp_line)
                  lines.append("")

              if tools:
                  lines.append("## 工具列表")
                  lines.append("")
                  for tool in tools:
                      line = f'- **{tool.get("name", "")}**'
                      if tool.get("author"):
                          line += f' by {tool.get("author")}'
                      if tool.get("stars"):
                          line += f' · ★ {tool.get("stars")}'
                      if tool.get("meta"):
                          line += f' · {tool.get("meta")}'
                      lines.append(line)
                      if tool.get("description"):
                          lines.append(f'  - {tool.get("description")}')
                  lines.append("")
              else:
                  lines.append("暂无工具数据。")
                  lines.append("")

              out_path = os.path.join("agent-skills", "scenario", f"{slug}.md")
              with open(out_path, "w", encoding="utf-8") as f:
                  f.write("\n".join(lines))

          def cleanup_old_generated_pages(valid_slugs):
              out_dir = os.path.join("agent-skills", "scenario")
              os.makedirs(out_dir, exist_ok=True)
              for filename in os.listdir(out_dir):
                  if not filename.endswith(".md"):
                      continue
                  slug = filename[:-3]
                  if slug not in valid_slugs:
                      os.remove(os.path.join(out_dir, filename))

          summary = parse_home_summary()
          scenarios = parse_best_scenarios()

          curated_paths = [
              "/best/prompt-engineering/",
              "/best/browser-automation/",
              "/best/workflow-automation/"
          ]

          curated = []
          valid_slugs = set()

          for p in curated_paths:
              try:
                  block = parse_scenario_page(p)
                  curated.append(block)
                  valid_slugs.add(block["slug"])
              except Exception as e:
                  slug = safe_slug(p.strip("/").split("/")[-1])
                  curated.append({
                      "title": slug.replace("-", " ").title(),
                      "url": BASE + p,
                      "source_url": BASE + p,
                      "slug": slug,
                      "local_url": f"/agent-skills/scenario/{slug}/",
                      "quick_pick": {},
                      "tools": [],
                      "error": str(e)
                  })
                  valid_slugs.add(slug)

          # 把热门场景里已有的 slug 也加入，后续可扩展更多本地页
          for item in scenarios:
              valid_slugs.add(item["slug"])

          meta = {
              "source": BASE,
              "updated_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          }

          write_json("_data/agentskills/meta.json", meta)
          write_json("_data/agentskills/summary.json", summary)
          write_json("_data/agentskills/scenarios.json", scenarios)
          write_json("_data/agentskills/curated.json", curated)

          cleanup_old_generated_pages(valid_slugs)

          for block in curated:
              write_local_scenario_page(block)

          print("Done. JSON and local pages generated.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/agentskills agent-skills/scenario
          git diff --cached --quiet || git commit -m "chore: sync AgentSkillsHub content"

      - name: Push changes
        run: git push
